function CheckSection({titulo, items}) {
  const [checks, setChecks] = useState(Array(items.length).fill(false));
  const done = checks.filter(Boolean).length;
  const toggle = i => { const n=[...checks]; n[i]=!n[i]; setChecks(n); };
  return (
    <div style={{marginBottom:20}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{fontSize:15,fontWeight:700}}>{titulo}</div>
        <span style={{fontSize:12,color:'#888'}}>{done}/{items.length}</span>
      </div>
      <div className="card" style={{padding:'0 16px'}}>
        {items.map((item,i) => (
          <div key={i} className="check-item" onClick={() => toggle(i)}>
            <div className="check-sq" style={{background:checks[i]?'#22c55e':'transparent',borderColor:checks[i]?'#22c55e':'#ddd'}}>
              {checks[i] ? '✓' : ''}
            </div>
            <span style={{textDecoration:checks[i]?'line-through':'none',color:checks[i]?'#aaa':'#333'}}>{item}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

            Antonia y Vicente (doble nacionalidad) deben usar el pasaporte italiano en España y Portugal — sin restricciones como ciudadanos europeos.

      {tab==='finanzas' && (
        <div className="section">
          <div className="stat-grid">
            {[{n:'€728',l:'Bettocchi deben ya',c:'#22c55e'},{n:'€731',l:'Pendiente 1 mayo',c:'#f59e0b'},{n:'€1,460',l:'Total a cobrar',c:'#E63946'}].map((s,i) => (
              <div key={i} className="stat-card"><div className="stat-num" style={{color:s.c}}>{s.n}</div><div className="stat-label">{s.l}</div></div>
            ))}
          </div>

          <div className="sub-title">Ya pagado — Bettocchi deben 50%</div>
          <div className="card">
            {[['Hotel Porto','€1,113.88','€556.94'],['Palacio da Pena','€192.50','€96.25'],['Quinta da Regaleira','€150.33','€75.17']].map(([c,t,d],i) => (
              <div key={i} style={{marginBottom:i<2?12:0,paddingBottom:i<2?12:0,borderBottom:i<2?'1px solid #f5f5f5':'none'}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:4}}>

                <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'#777'}}>
                  <span>→ Bettocchi deben</span><span style={{fontWeight:700,color:'#333'}}>{d}</span>

            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'#777'}}>
              <span>Total</span><span style={{fontWeight:700}}>€1,462.50</span>
            </div>

              <span>→ Bettocchi deberán</span><span style={{fontWeight:700,color:'#333'}}>€731.25</span>

            Consultar con tu banco si la VISA Infinite cubre seguro de colisión en alquiler de autos en Europa (Sixt · Ref: 795855353).
          </div>
        </div>
      )}

      {tab==='equipaje' && (
        <div className="section">
          <div className="sub-title">🌤️ Clima por ciudad</div>
          <div className="card">
            {[['Barcelona (30 abr–2 may)','18–23°C día · 12–17°C noche · Lluvia ocasional'],['Madrid','~24°C día · ~13°C noche · Posibles tormentas'],['Porto (3–5 may)','17–26°C · Más fresco · Posible lluvia'],['Lisboa (5–8 may)','~22°C día · ~13°C noche · 9h de sol']].map(([l,v],i) => (
              <div key={i} className="info-row"><span className="info-label" style={{fontSize:12}}>{l}</span><span className="info-value">{v}</span></div>

          <div className="sub-title">🧳 Maletas recomendadas</div>
          <div className="card">
            {[['Maleta bodega ida','2 x 23kg · Rodolfo y Luciana · US$190 ✅'],['Maleta bodega vuelta','2 x 23kg · Rodolfo y Luciana · US$168 ✅'],['Total maletas','US$358 ✅'],['Antonia y Vicente','Hand carry 56x40x25cm únicamente'],['Cercanías gratis iryo','Mostrar código Aztec en tornos T4 planta -1']].map(([l,v],i) => (

            {PACKING.map((item,i) => (
              <div key={i} className="check-item" onClick={() => { const n=[...packDone]; n[i]=!n[i]; setPackDone(n); }}>

}

</script>
